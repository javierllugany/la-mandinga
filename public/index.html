<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mandinga - Productos Saludables</title>
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>🌿 La Mandinga</h1>
            <p>Productos Saludables de Calidad</p>
        </div>
    </header>

    <main id="app">
        <section id="categorias-container">
            <!-- Las categorías se cargarán dinámicamente -->
        </section>
    </main>

    <!-- Modal para detalles del producto -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="product-detail">
                <!-- Detalles del producto cargados dinámicamente -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 La Mandinga - Productos Saludables</p>
    </footer>

    <script src="scripts/main.js"></script>
    <script src="scripts/productDetail.js"></script>
</body>
</html>
